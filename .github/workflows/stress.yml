name: stress
on:
  pull_request:
  push: { branches: [main] }

# Independent of the required `verify` check. Gates on crashes / correctness failures under
# load (the harnesses exit non-zero on those), not on absolute throughput (machine-dependent).
jobs:
  stress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:cli
      - run: pnpm run stress:mcp # correctness + concurrent load on the real ledgers
        env: { N: "2000", C: "48" }
      - run: pnpm run stress:extended smoke # huge synthetic ledger + fuzz-under-load
